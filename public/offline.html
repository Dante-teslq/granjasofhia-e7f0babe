<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Granja Sofhia - Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;background:#f7f7f7;color:#262626}
    .container{text-align:center;padding:2rem}
    .logo{width:80px;height:80px;border-radius:16px;margin-bottom:1.5rem}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:0.5rem;color:#b99936}
    p{font-size:0.875rem;color:#757575;margin-bottom:1.5rem}
    button{background:#b99936;color:#fff;border:none;padding:0.625rem 1.5rem;border-radius:0.5rem;font-size:0.875rem;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.jpg" alt="Granja Sofhia" class="logo"/>
    <h1>Sem conexão</h1>
    <p>Verifique sua internet e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
